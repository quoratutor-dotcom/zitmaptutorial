# One-command local/staging PostgreSQL + MinIO (a real, self-hosted
# S3-compatible object store), matching the defaults in .env.example.
# Neither is required for production (use a managed Postgres provider and
# either MinIO on your own server or a cloud provider like AWS S3 /
# Cloudflare R2 — see README "Database setup" and .env.example), but both
# are handy for local development or a staging environment that wants
# real Postgres + real S3-compatible storage without any cloud account.
#
# Usage:
#   docker compose up -d
#   # then in your .env:
#   # DATABASE_URL=postgres://zitmap:zitmap_dev_pw@localhost:5432/zitmap
#   # S3_BUCKET=zitmap-uploads
#   # S3_ENDPOINT=http://localhost:9000
#   # S3_REGION=us-east-1
#   # S3_ACCESS_KEY_ID=zitmap_minio
#   # S3_SECRET_ACCESS_KEY=zitmap_minio_dev_pw
#   # S3_FORCE_PATH_STYLE=true
version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zitmap
      POSTGRES_PASSWORD: zitmap_dev_pw
      POSTGRES_DB: zitmap
    ports:
      - "5432:5432"
    volumes:
      - zitmap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zitmap -d zitmap"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Real S3-compatible object storage — the exact same S3 HTTP API that
  # AWS S3, Cloudflare R2, Backblaze B2, and DigitalOcean Spaces speak, so
  # the storage adapter (backend/storage/index.js) needs zero code changes
  # to talk to it. Swap this container out for a cloud provider in
  # production just by changing the S3_* env vars — same code path either
  # way, verified by this project's own automated tests.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: zitmap_minio
      MINIO_ROOT_PASSWORD: zitmap_minio_dev_pw
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console (login with the credentials above)
    volumes:
      - zitmap_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot helper: creates the "zitmap-uploads" bucket automatically on
  # first startup so you don't have to click through the MinIO console.
  # Exits immediately once done — expected to show as "Exited (0)".
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 zitmap_minio zitmap_minio_dev_pw &&
        mc mb --ignore-existing local/zitmap-uploads
      "

volumes:
  zitmap_pgdata:
  zitmap_minio_data:
